{% extends 'base.html' %}

{% block contenido %}

<h2>Clientes</h2>

<hr>

<a href="/clientes/nuevo" class="btn btn-primary mb-3">
    Nuevo Cliente
</a>

<table id="tablaClientes" class="table table-striped table-hover">

    <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Acciones</th>

        </tr>

    </thead>

    <tbody>

    {% for c in clientes %}

        <tr>

            <td>{{ c.id }}</td>
            <td>{{ c.nombre }}</td>
            <td>{{ c.telefono }}</td>
            <td>{{ c.correo }}</td>

            <td>

                <a href="/clientes/editar/{{ c.id }}"
                   class="btn btn-warning btn-sm">

                    Editar

                </a>

                <a href="/clientes/eliminar/{{ c.id }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar este cliente?')">

                    Eliminar

                </a>

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}

{% block scripts %}

<script>

$(document).ready(function(){

    $('#tablaClientes').DataTable();

});

</script>

{% endblock %}
