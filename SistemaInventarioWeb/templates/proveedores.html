{% extends 'base.html' %}

{% block contenido %}

<h2>Proveedores</h2>

<hr>

<a href="/proveedores/nuevo"
class="btn btn-primary mb-3">

Nuevo Proveedor

</a>

<table id="tablaProveedores"
class="table table-striped table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Teléfono</th>
<th>Correo</th>
<th>Acciones</th>

</tr>

</thead>

<tbody>

{% for p in proveedores %}

<tr>

<td>{{p.id}}</td>

<td>{{p.nombre}}</td>

<td>{{p.telefono}}</td>

<td>{{p.correo}}</td>

<td>

<a href="/proveedores/editar/{{p.id}}"
class="btn btn-warning btn-sm">

Editar

</a>

<a href="/proveedores/eliminar/{{p.id}}"
class="btn btn-danger btn-sm"
onclick="return confirm('¿Eliminar proveedor?')">

Eliminar

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}

{% block scripts %}

<script>

$(document).ready(function(){

$('#tablaProveedores').DataTable();

});

</script>

{% endblock %}
