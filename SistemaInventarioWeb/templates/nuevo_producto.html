{% extends 'base.html' %}

{% block contenido %}

<h2>Nuevo Producto</h2>

<div class="card shadow">

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Código</label>
                <input
                    class="form-control"
                    name="codigo"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input
                    class="form-control"
                    name="nombre"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <input
                    class="form-control"
                    name="categoria">
            </div>

            <div class="mb-3">
                <label class="form-label">Costo de Compra</label>
                <input
                    class="form-control"
                    type="number"
                    step="0.01"
                    min="0"
                    name="costo"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Precio de Venta</label>
                <input
                    class="form-control"
                    type="number"
                    step="0.01"
                    min="0"
                    name="precio"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Stock Inicial</label>
                <input
                    class="form-control"
                    type="number"
                    min="0"
                    name="stock"
                    required>
            </div>

            <button class="btn btn-success">
                <i class="bi bi-check-circle"></i>
                Guardar Producto
            </button>

            <a
                href="/productos"
                class="btn btn-secondary">

                Cancelar

            </a>

        </form>

    </div>

</div>

{% endblock %}
