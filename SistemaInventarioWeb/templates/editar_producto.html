{% extends 'base.html' %}

{% block contenido %}

<h2>Editar Producto</h2>

<div class="card shadow">

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Código</label>
                <input
                    class="form-control"
                    name="codigo"
                    value="{{ producto.codigo }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input
                    class="form-control"
                    name="nombre"
                    value="{{ producto.nombre }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <input
                    class="form-control"
                    name="categoria"
                    value="{{ producto.categoria }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Costo de Compra</label>
                <input
                    class="form-control"
                    type="number"
                    step="0.01"
                    min="0"
                    name="costo"
                    value="{{ producto.costo }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Precio de Venta</label>
                <input
                    class="form-control"
                    type="number"
                    step="0.01"
                    min="0"
                    name="precio"
                    value="{{ producto.precio }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Stock</label>
                <input
                    class="form-control"
                    type="number"
                    min="0"
                    name="stock"
                    value="{{ producto.stock }}"
                    required>
            </div>

            <button class="btn btn-warning">
                <i class="bi bi-pencil-square"></i>
                Actualizar Producto
            </button>

            <a
                href="/productos"
                class="btn btn-secondary">

                Cancelar

            </a>

        </form>

    </div>

</div>

{% endblock %}
